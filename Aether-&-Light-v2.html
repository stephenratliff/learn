,{children:`
        :root{
          --paper:#FDFBF7; --ink:#121619; --navy:#0A1931; --electric:#2E5BFF; --copper:#C67C4E; --moss:#2A4A3B;
          --field-blue:rgba(46,91,255,0.12); --line:rgba(10,25,49,0.10); --card:#ffffff; --muted:rgba(18,22,25,0.62);
          --shadow:0 8px 30px rgba(10,25,49,0.06), 0 1px 3px rgba(10,25,49,0.06); --canvas-bg:#fbf7f0;
        }
        [data-theme="dark"]{
          --paper:#0a1020; --ink:#e9eefb; --card:#111a33; --line:rgba(255,255,255,0.10); --muted:rgba(230,236,255,0.80);
          --shadow:0 12px 40px rgba(0,0,0,0.45); --canvas-bg:#0d152a;
        }
        *{box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{margin:0}
        .root{
          background:var(--paper); color:var(--ink);
          font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
          line-height:1.65; -webkit-font-smoothing:antialiased;
          position:relative; overflow-x:hidden;
        }
        .root::before{
          content:""; position:fixed; inset:0; pointer-events:none; z-index:-1;
          background:
            radial-gradient(1200px 600px at 15% -10%, rgba(46,91,255,0.08), transparent 60%),
            radial-gradient(900px 500px at 90% 10%, rgba(198,124,78,0.10), transparent 60%),
            radial-gradient(1px 1px at 10% 20%, rgba(0,0,0,0.06) 0.5px, transparent 0.6px),
            radial-gradient(1px 1px at 70% 80%, rgba(0,0,0,0.04) 0.5px, transparent 0.6px);
          opacity:0.9;
        }
        [data-theme="dark"] .root::before{opacity:0.7}
        h1,h2,h3,.serif{font-family:"Newsreader",Georgia,serif; letter-spacing:-0.02em}
        .mono{font-family:"JetBrains Mono",ui-monospace,monospace}
        .container{width:min(1160px,92vw); margin-inline:auto}
        /* progress */
        .progress{position:fixed; top:0; left:0; height:2px; background:linear-gradient(90deg,var(--electric),var(--copper)); z-index:100; transition:width 0.08s linear}
        /* nav */
        .nav{position:sticky; top:0; z-index:40; backdrop-filter:saturate(1.2) blur(12px); background:color-mix(in srgb, var(--paper) 84%, transparent); border-bottom:1px solid var(--line)}
        .nav-inner{display:flex; align-items:center; justify-content:space-between; height:64px}
        .brand{display:flex; align-items:center; gap:12px; font-weight:600}
        .brand-mark{width:28px; height:28px; border:1px solid var(--line); display:grid; place-items:center; border-radius:8px; background:var(--card); box-shadow:var(--shadow); font-family:"Newsreader"; font-style:italic}
        .nav-links{display:flex; gap:22px; font-size:13px; letter-spacing:0.02em}
        .nav-links a{color:var(--muted); text-decoration:none; position:relative}
        .nav-links a:hover{color:var(--ink)}
        .nav-actions{display:flex; gap:10px; align-items:center}
        .pill{border:1px solid var(--line); background:var(--card); border-radius:999px; padding:7px 12px; font-size:12px; cursor:pointer; box-shadow:var(--shadow)}
        .pill:hover{transform:translateY(-1px)}
        /* hero */
        .hero{position:relative; padding:84px 0 42px; border-bottom:1px solid var(--line); overflow:hidden}
        .hero-grid{display:grid; grid-template-columns:1.15fr 0.85fr; gap:36px; align-items:end}
        @media(max-width:900px){.hero-grid{grid-template-columns:1fr} .nav-links{display:none} .hero-canvas-wrap{height:320px !important}}
        .kicker{font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:18px}
        .hero-title{font-size:clamp(56px,11vw,132px); line-height:0.88; font-weight:400; margin:0; letter-spacing:-0.04em}
        .hero-title em{font-style:italic; font-weight:600; color:var(--electric)}
        .hero-sub{font-size:clamp(16px,1.9vw,20px); line-height:1.5; color:var(--muted); max-width:42ch; margin-top:18px}
        .hero-meta{display:flex; gap:18px; margin-top:26px; flex-wrap:wrap}
        .meta-card{border:1px solid var(--line); background:var(--card); padding:12px 14px; border-radius:14px; min-width:156px; box-shadow:var(--shadow)}
        .meta-card b{display:block; font-family:"Newsreader"; font-size:18px; line-height:1.1}
        .hero-canvas-wrap{position:relative; border:1px solid var(--line); border-radius:18px; overflow:hidden; background:color-mix(in srgb, var(--card) 92%, var(--paper)); height:420px; box-shadow:var(--shadow)}
        .hero-canvas-wrap canvas{position:absolute; inset:0; width:100%; height:100%}
        .hero-overlay{position:absolute; inset:auto 14px 14px 14px; border:1px solid var(--line); background:color-mix(in srgb, var(--card) 88%, transparent); backdrop-filter:blur(10px); border-radius:12px; padding:12px 14px; font-size:12px}
        /* sections */
        section{padding:56px 0; border-bottom:1px solid var(--line)}
        .eyebrow{font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--copper); font-weight:600; margin-bottom:10px}
        .h2{font-size:clamp(28px,4.2vw,46px); line-height:1.05; margin:0 0 14px}
        .lead{font-size:18px; line-height:1.65; color:var(--muted); max-width:62ch}
        .grid-2{display:grid; grid-template-columns:1.05fr 0.95fr; gap:34px}
        @media(max-width:980px){.grid-2{grid-template-columns:1fr}}
        .card{border:1px solid var(--line); background:var(--card); border-radius:18px; padding:18px 18px; box-shadow:var(--shadow); position:relative}
        .soft{color:var(--muted)}
        /* timeline */
        .timeline{position:relative; padding-left:28px; border-left:1px dashed var(--line); display:grid; gap:26px}
        .tl-item{position:relative}
        .tl-dot{position:absolute; left:-33px; top:6px; width:10px; height:10px; border-radius:50%; background:var(--paper); border:2px solid var(--electric); box-shadow:0 0 0 4px var(--field-blue)}
        .tl-year{font-family:"JetBrains Mono"; font-size:12px; letter-spacing:0.06em; color:var(--electric); font-weight:600}
        .tl-title{font-family:"Newsreader"; font-size:20px; margin:2px 0 6px}
        /* maxwell cards */
        .eq-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px}
        @media(max-width:860px){.eq-grid{grid-template-columns:1fr}}
        .eq-card{padding:18px; border-radius:18px; border:1px solid var(--line); background:var(--card); box-shadow:var(--shadow); transition:transform .18s, border-color .18s}
        .eq-card:hover{transform:translateY(-2px); border-color:color-mix(in srgb, var(--electric) 28%, var(--line))}
        .eq-card .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
        .badge{font-size:10px; letter-spacing:0.12em; text-transform:uppercase; border:1px solid var(--line); padding:4px 8px; border-radius:999px; background:color-mix(in srgb, var(--field-blue) 60%, transparent)}
        .eq-card h4{margin:6px 0 8px; font-size:18px; font-family:"Newsreader"}

        [data-theme="dark"] .eq-box{background:color-mix(in srgb, var(--canvas-bg) 88%, var(--card))}
        .katex-eq{display:inline-block; min-height:1.1em}
        .katex-eq[data-display="true"]{display:block; text-align:center; margin:8px 0; width:100%}
        .katex-display{margin:0 !important}
        /* canvas */
        canvas{display:block; width:100%; border-radius:14px; border:1px solid var(--line); background:var(--canvas-bg)}
        .controls{display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-top:12px}
        .control{display:flex; align-items:center; gap:10px; border:1px solid var(--line); background:var(--card); border-radius:999px; padding:8px 12px; font-size:12px; box-shadow:var(--shadow)}
        .control input[type="range"]{accent-color:var(--electric); width:120px}
        @media(max-width:600px){.control input[type="range"]{width:86px}}
        /* code */
        pre{margin:0; padding:16px 16px 16px 16px; overflow:auto; font-size:12.6px; line-height:1.6; background:color-mix(in srgb, var(--paper) 78%, var(--card)); border-radius:12px; border:1px solid var(--line)}
        code{font-family:"JetBrains Mono",monospace}
        .code-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
        .copy{border:1px solid var(--line); background:var(--card); border-radius:999px; padding:6px 10px; font-size:11px; cursor:pointer}
        .copy:hover{background:var(--field-blue)}
        /* reveal */
        .reveal{opacity:0; transform:translateY(12px); transition:opacity .6s ease, transform .6s ease}
        .reveal.in{opacity:1; transform:none}
        /* footer */
        footer{padding:44px 0 68px}
        a{color:var(--electric)} a:hover{opacity:.85}
        .hr{height:1px; background:var(--line); margin:18px 0}
