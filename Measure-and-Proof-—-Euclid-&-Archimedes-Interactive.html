elogram on the same base and between same parallels has equal area to the rectangle. No numbers appear. The statement ",p(qe,{children:"a² + b² = c²"})," is read as equality of figures, not of numbers. Book VI later reframes similarity via Eudoxus theory of proportion, allowing a proof by similar triangles that most students meet today. That both proofs coexist shows the Elements is not linear in discovery but architected for minimal assumptions."]}),p("p",{children:"Euclid also proves the converse, I.48: if the squares condition holds, the angle is right. This completes the circle from construction to criterion, and gives a practical test for right angles used by rope stretchers in Egypt."})]}),p(F0,{})]})]}),y("div",{className:"mt-14 reveal",children:[p("h3",{className:"text-[26px] font-[600]",children:"Number Theory — Primes and the Euclidean Algorithm"}),y("div",{className:"mt-4 grid md:grid-cols-[1.15fr_0.85fr] gap-6",children:[y("div",{className:"prose",children:[p("p",{children:"In Books VII to IX Euclid turns to number, defined as multitude of units. He proves the infinitude of primes in IX.20 with a proof that still feels like a magic trick. Take any finite list of primes, multiply them and add one. The resulting number N is not divisible by any prime in the list, so either N is prime or it has a prime divisor not in the list. Therefore no finite list exhausts the primes. The proof is constructive in spirit and yields Euclid numbers. It does not say N itself is prime, a common misreading, and Euclid never uses proof by contradiction here, he exhibits a new prime."}),y("p",{children:["The Euclidean algorithm in VII.1-2 is older than Euclid, but his formulation is geometric: given two segments, repeatedly subtract the smaller from the larger. If the process ends, the last non-zero remainder is the greatest common measure. If it never ends, the magnitudes are incommensurable, as with side and diagonal of a square. The algorithm runs in O(log min(a,b)) and exte heorem that the area of a circle equals the area of a right triangle with legs r and circumference C, so A = 1/2 r C. He then proves ",p(qe,{children:"223/71 < π < 22/7"})," by inscribing and circumscribing regular 96 gons. Starting from hexagons where side equals radius, he repeatedly bisects angles using half angle formulas equivalent to sqrt approximations, keeping inequalities rigorous without decimal notation. He works with ratios and bounds like 1351/780 > sqrt(3) > 265/153, showing extraordinary skill with inequalities. The upper bound 22/7 is familiar, the lower bound 223/71 = 3.14084 is less famous but tighter than many remember. The method is exhaustion: as n grows, inscribed perimeter increases and circumscribed decreases, both converging to the circle. The error is controlled by geometry, not by limits."]}),p("p",{children:"In modern terms, for unit radius, inscribed perimeter P_in = 2 n sin(π/n) and circumscribed P_out = 2 n tan(π/n). Half of these bound π. Archimedes does not use trigonometric functions, he uses chord tables and similar triangles, but the mathematics is the same."})]}),p(D0,{})]})]}),y("div",{className:"mt-14 reveal",children:[p("h3",{className:"text-[26px] font-[600]",children:"Quadrature of the Parabola"}),y("div",{className:"mt-4 grid md:grid-cols-[1.15fr_0.85fr] gap-6",children:[p("div",{className:"prose",children:p("p",{children:"The parabola had no equation for Archimedes, it was a section of a cone. He proves the area of a parabolic segment cut by a chord is four thirds the area of the inscribed triangle with same base and vertex at the point farthest from the base. The proof is twofold. First, by lever and indivisibles, he guesses the answer by slicing the segment and the triangle and balancing them. Then he proves exhaustion: fill the segment with a central triangle T, then fill the two remaining curvilinear gaps with triangles each 1/8 of T, then four gaps with triangles 1/64, and so on. The areas form geometric progression 1 + 1/4 + 1/16 + ... The Greeks knew how to sum such series: the sum to n terms is (4/3)(1 - (1/4)^(n+1)). The remainder can be made smaller than any assigned area, so by double contradiction the total is 4/3 T. This is the first example of integrating x squared, since integral 0 to 1 of x squared dx equals 1/3, and the parabolic segment area is 4/3 of triangle."})}),p(O0,{})]})]}),y("div",{className:"mt-14 reveal",children:[p("h3",{className:"text-[26px] font-[600]",children:"On the Sphere and Cylinder"}),y("div",{className:"mt-4 grid md:grid-cols-[1.15fr_0.85fr] gap-6",children:[p("div",{className:"prose",children:y("p",{children:["Archimedes considered his results on sphere and cylinder his finest. He proves volume of sphere ",p(qe,{children:"V = 4/3 π r³"})," and surface area ",p(qe,{children:"A = 4 π r²"})," by comparing with circumscribed cylinder of height 2r. The cylinder volume is ",p(qe,{children:"2 π r³"}),", so sphere is exactly two thirds of cylinder, and same for surface area if you include bases. The argument uses method of exhaustion with inscribed and circumscribed solids of revolution made of conical frustums. He also determines surface area of spherical zone. The ratio 2:3 is dimension independent in a deep way that would later connect to Cavalieri and to modern measure. Cicero reports finding the tomb marked by a sphere in a cylinder. When the Palimpsest was restored, a diagram of this theorem was visible beneath a prayer book."]})}),p(R0,{})]})]}),y("div",{className:"mt-14 reveal",children:[p("h3",{className:"text-[26px] font-[600]",children:"Levers, Centers of Gravity, and Buoyancy"}),p("div",{className:"mt-2 prose",children:y("p",{children:["Give me a place to stand, and I will move the Earth. The law of the lever, proved in On the Equilibrium of Planes, states that magnitudes balance at distances inversely proportional to weights: ",p(qe,{children:"m₁ d₁ = m₂ d₂"}),". Archimedes defines center of gravity and finds it for triangles, parallelograms, and parabolic segments. In On Floating Bodies, he founds hydrostatics. Proposition 7: a solid heavier than fluid sinks, weight loss equals weight of displaced fluid. The principle is not just about crowns, it gives stable equilibrium conditions for floating paraboloids, work that would not be matched until the 17th century. The lever proof uses symmetry and superposition, already a physical axiom in geometry."]})}),p("div",{className:"mt-5",children:p(U0,{})})]}),y("div",{className:"mt-14 reveal",children:[p("h3",{className:"text-[26px] font-[600]",children:"Spirals, Large Numbers, and the Mechanical Method"}),y("div",{className:"mt-4 grid md:grid-cols-[1.15fr_0.85fr] gap-6",children:[y("div",{className:"prose",children:[y("p",{children:["On Spirals defines the curve ",p(qe,{children:"r = a + b θ"})," as the locus of a point moving uniformly outward along a ray that rotates uniformly. Archimedes finds the tangent, area of one turn, and uses it to trisect an angle and square the circle in a neusis sense. The curve converts circular to linear motion and appears in scroll compressors and antennas today."]}),p("p",{children:"In The Sand Reckoner, Archimedes invents a system for naming numbers up to 10^(8×10^16), far beyond Greek myriad, to show he can count grains of sand filling the cosmos. He estimates the universe with Aristarchus heliocentric model, using angular size of sun and geometric bounds. It is the first scientific notation paper. The Method shows how he discovered theorems by slicing figures into indivisibles and weighing them on an imagined balance, a precursor to integration that he hid from formal presentation because indivisibles lacked Euclidean rigor."})]}),p(V0,{})]})]}),y("div",{className:"mt-14 reveal prose",children:[p("h3",{className:"text-[24px] font-[600]",children:"Legacy — Rigor plus Exhaustion equals Calculus"}),p("p",{children:"Euclid gave mathematics its grammar: start with explicit assumptions, proceed by justified steps, leave no hidden appeal to picture. Archimedes gave it its engine: approximate curved figures by polygons and polyhedra whose areas you control, bound error from both sides, and pass to limit by double contradiction. When Newton and Leibniz invented calculus, they repeated Archimedes with algebraic notation. The fundamental theorem that area under parabola is 1/3 had already been proved geometrically. What changed was speed, not essence. In the twentieth century, Robinson's nonstandard analysis and modern measure theory finally gave rigorous foundations to Archimedes indivisibles. The Alexandria library burned, but the scrolls that survived show a complete arc: Euclid defined proof, Archimedes showed proof could move the world."})]}),y("div",{className:"mt-14 reveal",children:[p("h3",{className:"text-[22px] font-[600]",children:"Octave — Archimedes Toolbox"}),p(Je,{title:"Pi bounds via inscribed and circumscribed n-gons",filename:"arch_pi_polygon.m",code:`function [pi_low, pi_high] = arch_pi_polygon(n)
