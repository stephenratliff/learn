g-[#EEF1FA] text-[#2E5EAA]",children:"1883 Grundlagen"}),d("span",{className:"px-2 py-1 rounded bg-[#EEF1FA] text-[#2E5EAA]",children:"1891 diagonal"})]})]}),S("div",{className:"rounded-[16px] border border-[#E8E0D6] bg-white p-4",children:[d("div",{className:"text-[11px] uppercase tracking-wide text-[#9A958E]",children:"Timeline dots"}),S("div",{className:"mt-3 relative h-[88px]",children:[d("div",{className:"absolute top-1/2 left-0 right-0 h-[1px] bg-[#E8E0D6]"}),d("div",{className:"relative flex justify-between",children:[{y:1874,l:"R uncountable"},{y:1878,l:"R^n ~ R"},{y:1883,l:"Well ordering"},{y:1891,l:"Diagonal"},{y:1897,l:"Paradoxes"}].map((r)=>S("div",{className:"flex flex-col items-center",children:[d("div",{className:"w-2.5 h-2.5 rounded-full bg-[#2E5EAA] border-2 border-white shadow"}),d("span",{className:"mt-2 text-[11px] font-mono",children:r.y}),d("span",{className:"text-[10px] text-[#9A958E]",children:r.l})]},r.y))})]})]})]}),S("section",{id:"c-infinity",className:"reveal mt-14",children:[d("h3",{className:"text-[22px]",children:"The Revolution of Actual Infinity"}),S("div",{className:"mt-3 grid md:grid-cols-[1.15fr_0.85fr] gap-6",children:[d("div",{className:"text-[14.5px] leading-[1.85] text-[#2E2D2A]",children:d("p",{children:"Before Cantor, infinity was potential, a process that never ends, in the Aristotelian sense. Gauss warned against treating completed infinities as objects. Cantor reversed this. A set, he wrote, is a gathering together into a whole of definite, distinct objects of our perception or thought. The definition is deliberately naive, it predates the paradoxes of 1900. Membership, denoted x ∈ M, is primitive. From sets we build everything, ordered pairs, functions, numbers. The audacity was philosophical as much as technical. If a set can be infinite and still be a single object, then we can compare such objects. That comparison required a definition of size that does not appeal to counting, because counting never finishes. Cantor's move was to replace counting by pairing."})}),S("div",{className:"rounded-xl bg-white border border-[#E8E0D6] p-4 text-[13px] leading-[1.7]",children:[d("div",{className:"font-mono text-[11px] uppercase tracking-wide text-[#2E5EAA]",children:"Definition"}),d("div",{className:"mt-2 font-serif text-[16px]",children:"A set M is any collection of distinct objects. If x is in M we write x ∈ M."}),d("div",{className:"mt-3 font-mono text-[12px] bg-[#FFFCF6] border border-[#E8E0D6] rounded-lg p-2",children:"A function f: A → B is a set of pairs (a,b) such that each a occurs once. It is injective if f(a1)=f(a2) ⇒ a1=a2, surjective if every b has a preimage, bijective if both."})]})]})]}),S("section",{id:"c-bijection",className:"reveal mt-14",children:[d("h3",{className:"text-[22px]",children:"Cardinality and Bijection"}),d("p",{className:"mt-3 max-w-[70ch] text-[14.5px] leading-[1.85] text-[#2E2D2A]",children:"Cantor defines |A| = |B| iff there exists a bijection f: A → B. A set is countable iff |A| = |N| or finite, meaning its elements can be listed as a0, a1, a2, …. This immediately yields surprises. The even numbers are in bijection with N via n ↦ 2n, so there are as many evens as naturals. The integers are countable by zigzagging 0, 1, -1, 2, -2, …. The positive rationals are countable by traversing the infinite grid of fractions p/q along diagonals and skipping repeats, Cantor's pairing function π(m,n)= (m+n)(m+n+1)/2 + n provides an explicit bijection N×N → N. What matters is not density or intuition, but existence of a perfect pairing. Countable sets can be dense, infinite, and still listable."}),d("div",{className:"mt-5",children:d(T0,{})})]}),S("section",{id:"c-diagonal",className:"reveal mt-14",children:[d("h3",{className:"text-[22px]",children:"The Diagonal Argument"}),d("p",{className:"mt-3 text-[14.5px] leading-[1.85] text-[#2E2D2A] max-w-[70ch]",children:"Suppose we try to list all infinite binary strings. Any list L1, L2, … can be pictured as an infinite matrix where row i is Li. Look at the diagonal entries d_i = Li(i). Flip each bit, define a_i = 1 - d_i. Then the string a = a1 a2 … differs from Li at position i by construction, so a is not in the list. Hence no list can contain all binary strings. Identifying a binary string with a real number in [0,1] via binary expansion shows R is uncountable. More generally, Cantor proved |X| < |P(X)| for any set X, where P(X) is the power set. The diagonal method is a template for impossibility proofs, from Gödel to Turing, all rely on a self referential diagonal that escapes enumeration."}),d("div",{className:"mt-5",children:d(L0,{})})]}),S("section",{id:"c-power",className:"reveal mt-14",children:[d("h3",{className:"text-[22px]",children:"Power Set, Alephs, Continuum Hypothesis"}),S("div",{className:"mt-3 grid md:grid-cols-2 gap-6 text-[14.5px] leading-[1.85] text-[#2E2D2A]",children:[d("p",{children:"Theorem: for any set X, there is no surjection X → P(X). Proof is diagonal again. Suppose f: X → P(X). Let D = { x ∈ X | x ∉ f(x) }. If D = f(d) for some d, then d ∈ D iff d ∉ f(d) iff d ∉ D, contradiction. So |X| < |P(X)|. Starting from N, we obtain an endless tower |N| = ℵ₀ < |P(N)| = 2^{ℵ₀} = \uD835\uDD20 < |P(P(N))| … Cantor introduced ℵ₀, ℵ₁, ℵ₂ for the infinite cardinals in increasing order, and beth numbers b₀=ℵ₀, b_{n+1}=2^{b_n}. The continuum is \uD835\uDD20 = b₁. The Continuum Hypothesis asserts there is no cardinal strictly between ℵ₀ and \uD835\uDD20, i.e., \uD835\uDD20 = ℵ₁. Cantor believed it true. In 1963 Cohen showed CH is independent of ZFC, it can neither be proved nor disproved from standard axioms, a profound limit that Cantor did not live to see."}),S("div",{className:"rounded-xl border border-[#E8E0D6] bg-white p-4",children:[d("div",{className:"font-mono text-[11px] uppercase text-[#2E5EAA]",children:"Cardinal picture"}),S("div",{className:"mt-2 font-serif text-[15px] leading-[1.6]",children:["ℵ₀ = |N| = |Z| = |Q|",d("br",{}),"\uD835\uDD20 = |R| = |P(N)| = 2^{ℵ₀}",d("br",{}),"2^{\uD835\uDD20} = |P(R)| = |functions R→{0,1}|",d("br",{}),d("br",{}),"CH: ∄ A with ℵ₀ < |A| < \uD835\uDD20",d("br",{}),"GCH: 2^{ℵ_α} = ℵ_{α+1}"]}),d("div",{className:"mt-3 text-[12px] text-[#6B6A6A]",children:"Independence means we can have set theoretic universes where CH holds and others where it fails, both consistent if ZFC is."})]})]})]}),S("section",{id:"c-set",className:"reveal mt-14",children:[d("h3",{className:"text-[22px]",children:"The Cantor Set"}),d("p",{className:"mt-3 text-[14.5px] leading-[1.85] max-w-[70ch] text-[#2E2D2A]",children:"Take [0,1], remove the open middle third (1/3,2/3), then remove middle thirds of the remaining intervals, and continue. The intersection C = ∩_{n} C_n is the Cantor set. At stage n there are 2^n intervals each of length 3^{-n}, so total length (2/3)^n → 0, hence Lebesgue measure zero, yet |C| = |R|, it is uncountable, compact, perfect and nowhere dense, a fractal before the word existed. Its Hausdorff dimension is log 2 / log 3. Points of C are exactly those numbers in [0,1] whose ternary expansion uses only 0 and 2. The set is self similar, each piece is a scaled copy of the whole. Cantor introduced it in 1883 as an example of a perfect set that is not an interval, a dust that topologically is as large as the continuum but metrically invisible."}),d("div",{className:"mt-5",children:d(I0,{})})]}),S("section",{className:"reveal mt-10 rounded-xl bg-[#F6F1E8] border border-[#E8E0D6] p-5 text-[13.5px] leading-[1.8] text-[#3A3936]",children:[d("strong",{className:"font-serif text-[15px]",children:"Philosophical fallout."})," Kronecker called Cantor a scientific charlatan, Poincaré called set theory a disease. Hilbert defended him: No one shall expel us from the paradise Cantor has created. The controversy was not only about proof, but about what mathematics is allowed to talk about. By treating infinite totalities as objects, Cantor shifted mathematics from construction to description, opening the way to modern logic, topology, and abstraction. The cost was paradox, the gain was a language in which almost all of contemporary mathematics can be written."]})]})]})}),d("div",{className:"max-w-[1100px] mx-auto px-5 md:px-8 mt-20",children:S("div",{className:"flex gap-6 md:gap-12",children:[d("div",{className:"hidden md:block w-[56px] shrink-0 pt-16",children:d("div",{className:"sticky top-[84px] text-[72px] leading-none font-serif font-[800] text-[#EDE0CF]",children:"II"})}),S("div",{className:"flex-1 min-w-0",children:[S("section",{id:"riemann",className:"reveal pt-16",children:[S("div",{className:"flex items-baseline gap-3",children:[d("h2",{className:"text-[36px] md:text-[44px] leading-[1.05]",children:"Bernhard Riemann"}),d("span",{className:"text-[12px] tracking-[0.16em] uppercase text-[#9A958E]",children:"1826-1866 - Gottingen"})]}),d("div",{className:"mt-2 h-[1px] w-full bg-gradient-to-r from-[#B96A2A] to-transparent"})]}),S("section",{id:"r-bio",className:"reveal mt-10 grid md:grid-cols-[1.2fr_0.8fr] gap-8",children:[d("p",{className:"text-[14.5px] leading-[1.85] text-[#2E2D2A]",children:"Riemann entered Göttingen to study theology, switched to mathematics, and became Gauss's last great student. He was shy, intensely religious, and prone to nervous breakdowns, yet his 1851 doctoral thesis founded the geometric theory of complex functions, his 1854 Habilitationsvortrag Über die Hypothesen, welche der Geometrie zu Grunde liegen invented n dimensional manifolds and intrinsic curvature, and his 1859 memoir on primes introduced the zeta function as a complex variable. He died of tuberculosis in Selasca at 39. In ten years he rewrote analysis, geometry and number theory. Where Cantor asked how big infinite sets are, Riemann asked what shape space can have, and discovered that shape can be defined from within, without an ambient Euclidean container."}),S("div",{className:"rounded-[16px] border border-[#E8E0D6] bg-white p-4 text-[12.5px] leading-[1.7]",children:[d("div",{className:"text-[11px] uppercase tracking-wide text-[#9A958E]",children:"Context"}),S("ul",{className:"mt-2 list-disc pl-4 space-y-1 text-[#3A3936]",children:[d("li",{children:"Student of Gauss, influenced by Dirichlet, Jacobi"}),d("li",{children:"Habilitation lecture delayed because Gauss chose the most speculative topic"}),d("li",{children:"Integral definition simplified Dirichlet's condition for Fourier series"}),d("li",{children:"Ideas on manifolds lay dormant until Einstein 1915"})]})]})]}),S("section",{id:"r-integral",className:"reveal mt-14",children:[d("h3",{className:"text-[22px]",children:"The Riemann Integral"}),d("p",{className:"mt-3 text-[14.5px] leading-[1.85] text-[#2E2D2A] max-w-[70ch]",children:"Let f be bounded on [a,b]. Partition [a,b] into subintervals, pick sample points, form Σ f(ξ_i) Δx_i. If these sums converge to a single limit as mesh → 0, f is Riemann integrable and the limit is ∫_a^b f. Darboux reformulated this with upper and lower sums. Riemann's definition made integration rigorous and separated integrability from continuity. A bounded function is Riemann integrable iff its set of discontinuities has measure zero, Lebesgue's later criterion. The integral is linear, monotone, additive over intervals, and satisfies the fundamental theorem when f has an antiderivative. It fails for functions that oscillate too wildly, like Dirichlet's characteristic of rationals, which motivated Lebesgue, but for most classical functions it is the integral we first learn, and the one whose sums you can see as rectangles approaching area."}),d("div",{className:"mt-5",children:d(F0,{})})]}),S("section",{id:"r-manifold",className:"reveal mt-14",children:[d("h3",{className:"text-[22px]",children:"Manifolds and Curvature"}),d("p",{className:"mt-3 text-[14.5px] leading-[1.85] text-[#2E2D2A] max-w-[70ch]",children:"In 1854 Riemann proposed that an n dimensional manifold is a space that locally looks like R^n, equipped with a rule for measuring infinitesimal distance ds² = Σ g_{ij}(x) dx^i dx^j where g_{ij} is the metric tensor. Curvature is then intrinsic, detectable by inhabitants without reference to an outer space, via the failure of the Pythagorean theorem at second order or via the angle sum of small geodesic triangles. Euclidean space has K=0, sphere has K>0, saddle has K<0. Riemann wrote down the curvature tensor in coordinates, now called the Riemann tensor R^i_{jkl}, whose vanishing characterizes flatness. This was the language Einstein needed sixty years later. Space is not a fixed stage, it is a flexible, measurable object whose geometry is determined by its metric."}),d("div",{className:"mt-5",children:d(O0,{})})]}),S("section",{id:"r-sphere",className:"reveal mt-14",children:[d("h3",{className:"text-[22px]",children:"The Riemann Sphere and Complex Analysis"}),d("p",{className:"mt-3 text-[14.5px] leading-[1.85] text-[#2E2D2A] max-w-[70ch]",children:"Take the complex plane C and add a point at infinity. Stereographic projection identifies C ∪ {∞} with the unit sphere S² in R³, mapping (X,Y,Z) to w = (X + iY)/(1 - Z), with north pole (0,0,1) → ∞. This compactification makes meromorphic functions into maps between spheres, and allows geometric intuition for Möbius transformations as rotations of the sphere. Riemann surfaces generalize this: a one dimensional complex manifold where multi valued functions like √z or log z become single valued by branching over the surface. Riemann's mapping theorem says any simply connected proper open subset of C is conformally equivalent to the unit disc. Complex analysis becomes geometry, analytic continuation becomes walking on a surface."}),d("div",{className:"mt-5",children:d(R0,{})})]}),S("section",{id:"r-zeta",className:"reveal mt-14",children:[d("h3",{className:"text-[22px]",children:"The Zeta Function"}),d("p",{className:"mt-3 text-[14.5px] leading-[1.85] text-[#2E2D2A] max-w-[70ch]",children:"For Re(s) > 1, ζ(s) = Σ_{n≥1} n^{-s} = ∏_{p prime} (1 - p^{-s})^{-1}. Euler discovered the product, linking sums over integers to primes. Riemann showed ζ extends meromorphically to all C with a simple pole at s=1, satisfies the functional equation ζ(s)=2^s π^{s-1} sin(πs/2) Γ(1-s) ζ(1-s), and has trivial zeros at s = -2, -4, … and nontrivial zeros ρ in the critical strip 0 < Re(ρ) < 1. The distribution of primes is controlled by these zeros via the explicit formula ψ(x)=x - Σ_{ρ} x^{ρ}/ρ - log 2π. Analytic continuation transforms a series that diverges at s=1 into a function that encodes arithmetic. The Euler product is the bridge: each prime contributes an independent harmonic factor, their product converges to ζ(s) when Re(s) > 1, and analytic continuation carries that prime information into the critical strip."}),d("div",{className:"mt-5",children:d(D0,{})})]}),S("section",{id:"r-rh",className:"reveal mt-12 rounded-[18px] border border-[#E8E0D6] bg-white p-5",children:[d("h3",{className:"text-[20px]",children:"The Hypothesis"}),d("p",{className:"mt-3 text-[14.5px] leading-[1.85] text-[#2E2D2A]",children:"Riemann observed that the first few zeros seem to lie on the line Re(s)=1/2 and conjectured that all nontrivial zeros do. Formally: if ζ(ρ)=0 and 0<Re(ρ)<1 then Re(ρ)=1/2. If true, the error term in the Prime Number Theorem becomes essentially square root optimal: |π(x)-Li(x)| = O(√x log x). The hypothesis has been checked for the first 10^{13} zeros by computer, and 41% of zeros are known to be on the line by analytic methods, but a proof remains elusive. It is the eighth Hilbert problem and a Clay Millennium problem. Its truth would mean the primes, though individually irregular, are as evenly distributed as possible given their density, a harmony between addition and multiplication."}),S("div",{className:"mt-4 grid md:grid-cols-3 gap-3 text-[12px]",children:[S("div",{className:"p-3 rounded-lg bg-[#FFFCF6] border border-[#E8E0D6]",children:[d("strong",{children:"π(x)"})," counts primes ≤ x"]}),S("div",{className:"p-3 rounded-lg bg-[#EEF1FA] border border-[#DDE3F3]",children:[d("strong",{children:"Li(x)=∫_2^x dt/log t"})," smooth approximation"]}),S("div",{className:"p-3 rounded-lg bg-[#FFF1E8] border border-[#EDE3D5]",children:[d("strong",{children:"RH ⇒"})," primes deviate from Li by at most about √x"]})]})]})]})]})}),S("section",{id:"octave",className:"reveal max-w-[1100px] mx-auto px-5 md:px-8 mt-16",children:[S("div",{className:"flex items-baseline gap-3",children:[d("h2",{className:"text-[28px]",children:"GNU Octave Companion"}),d("span",{className:"text-[11px] tracking-[0.14em] uppercase text-[#9A958E]",children:"Copy, paste, run"})]}),d("p",{className:"mt-2 max-w-[70ch] text-[13.5px] leading-[1.8] text-[#3A3936]",children:"All models above have a textual twin you can run locally. No toolboxes required, only core Octave and plot."}),S("div",{className:"mt-6 grid md:grid-cols-2 gap-6",children:[d("div",{className:"min-w-0",children:d($n,{title:"cantor_set.m",code:`function [C] = cantor_set(depth)
% CANTOR_SET  intervals of Cantor set at given depth
% Usage: C = cantor_set(5);  plot Cantor
  C = [0,1];
  for k=1:depth
    newC = zeros(2*size(C,1),2);
    idx=1;
    for i=1:size(C,1)
      a=C(i,1); b=C(i,2); third=(b-a)/3;
      newC(idx,:)   = [a, a+third]; idx++;
      newC(idx,:)   = [b-third, b]; idx++;
    end
    C=newC;
  end
  figure; hold on;
  for i=1:size(C,1)
    plot(C(i,:), [depth, depth], 'LineWidth', 6);
  end
  title(sprintf('Cantor set depth %d, total length (2/3)^%d = %.4f', depth, depth, (2/3)^depth));
end`})}),d("div",{className:"min-w-0",children:d($n,{title:"countable_Q.m",code:`function enumerate_rationals(N)
% Enumerate Q+ via Cantor pairing pi(a,b) = (a+b)*(a+b+1)/2 + b
  seen = containers.Map();
  out = [];
  m=1;
  while length(out)<N
    for a=1:m
      b=m-a+1;
      key=sprintf('%d/%d',a,b);
      g=gcd(a,b); ar=a/g; br=b/g;
      rkey=sprintf('%d/%d',ar,br);
      if ~isKey(seen,rkey)
        seen(rkey)=true;
        out(end+1,:) = [ar, br];
        if length(out)>=N, break; end
      end
    end
    m++;
  end
  disp(out);
  % Show bijection N -> Q
  for i=1:N
    printf('%d -> %d/%d\\n', i-1, out(i,1), out(i,2));
  end
end`})}),d("div",{className:"min-w-0",children:d($n,{title:"diagonal_demo.m",code:`function diagonal_demo()
  n=6; k=8;
  M = randi([0,1], n, k);

end`})}),d("div",{className:"min-w-0",children:d($n,{title:"riemann_sum.m",code:`function s = riemann_sum(f,a,b,n,method)
% RIEMANN_SUM  generic Riemann sum
% method = 'left','right','mid','trap'
  if nargin<5, method='mid'; end
  dx=(b-a)/n; s=0;
  for i=0:n-1
    x0=a+i*dx; x1=x0+dx;
    switch method
      case 'left',  s+=f(x0)*dx;
      case 'right', s+=f(x1)*dx;
      case 'mid',   s+=f((x0+x1)/2)*dx;
      case 'trap',  s+=(f(x0)+f(x1))/2*dx;

  end
  % Example:

  [X,Y,Z]=sphere(40);

  % point on sphere
