<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:   #0a0a0a;
      --yellow:  #f5c800;
      --amber:   #e08c00;
      --white:   #f0ede4;
      --stripe-w: 48px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Animated hazard-stripe border ── */
    body::before, body::after {
      content: '';
      position: fixed;
      left: 0; right: 0;
      height: 28px;
      background: repeating-linear-gradient(
        90deg,
        var(--yellow)  0,
        var(--yellow)  var(--stripe-w),
        var(--black)   var(--stripe-w),
        var(--black)   calc(var(--stripe-w) * 2)
      );
      background-size: calc(var(--stripe-w) * 2) 100%;
      animation: slide 1.2s linear infinite;
      z-index: 10;
    }
    body::before { top: 0; }
    body::after  { bottom: 0; animation-direction: reverse; }

    @keyframes slide {
      from { background-position: 0 0; }
      to   { background-position: calc(var(--stripe-w) * 2) 0; }
    }

    /* ── Side stripes ── */
    .side {
      position: fixed;
      top: 0; bottom: 0;
      width: 28px;
      background: repeating-linear-gradient(
        180deg,
        var(--yellow)  0,
        var(--yellow)  var(--stripe-w),
        var(--black)   var(--stripe-w),
        var(--black)   calc(var(--stripe-w) * 2)
      );
      background-size: 100% calc(var(--stripe-w) * 2);
      animation: slide-v 1.2s linear infinite;
      z-index: 10;
    }
    .side.left  { left: 0; }
    .side.right { right: 0; animation-direction: reverse; }

    @keyframes slide-v {
      from { background-position: 0 0; }
      to   { background-position: 0 calc(var(--stripe-w) * 2); }
    }

    /* ── Scanline overlay ── */
    .scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 3px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0.18) 4px
      );
      z-index: 5;
    }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 6;
      text-align: center;
      padding: 3.5rem 4rem;
      border: 3px solid var(--yellow);
      background: rgba(10,10,10,0.92);
      max-width: 680px;
      width: calc(100% - 96px);
      animation: flicker 6s ease-in-out infinite;
    }

    @keyframes flicker {
      0%,100%  { opacity: 1; }
      92%      { opacity: 1; }
      93%      { opacity: 0.7; }
      94%      { opacity: 1; }
      96%      { opacity: 0.85; }
      97%      { opacity: 1; }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(245,200,0,0.2);
      pointer-events: none;
    }

    /* ── Hard-hat icon ── */
    .icon {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 1.2rem;
      display: block;
      animation: bob 2s ease-in-out infinite;
    }
    @keyframes bob {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-8px); }
    }

    /* ── Hello World badge ── */
    .hello {
      display: inline-block;
      font-family: 'Black Ops One', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5.2rem);
      color: var(--yellow);
      letter-spacing: 0.04em;
      text-shadow:
        4px 4px 0 var(--amber),
        8px 8px 0 rgba(224,140,0,0.25);
      line-height: 1;
    }

    .tagline {
      margin-top: 1rem;
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(240,237,228,0.6);
    }

    .divider {
      margin: 1.8rem auto;
      width: 60px;
      height: 3px;
      background: var(--yellow);
    }

    .message {
      font-size: 0.95rem;
      line-height: 1.8;
      color: rgba(240,237,228,0.75);
      max-width: 420px;
      margin: 0 auto;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      margin-top: 2.2rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(245,200,0,0.3);
      height: 10px;
      width: 100%;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--amber), var(--yellow));
      animation: fill 4s cubic-bezier(0.4,0,0.2,1) 0.5s forwards;
    }
    @keyframes fill {
      to { width: 72%; }
    }

    .progress-label {
      margin-top: 0.6rem;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      color: rgba(240,237,228,0.4);
      text-align: right;
    }

    /* ── Blinking cursor ── */
    .cursor {
      display: inline-block;
      width: 10px; height: 1.1em;
      background: var(--yellow);
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ── Footer ── */
    .footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: rgba(240,237,228,0.25);
    }
  </style>
</head>
<body>
  <div class="side left"></div>
  <div class="side right"></div>
  <div class="scanlines"></div>

  <div class="card">
    <span class="icon">🦺</span>

    <div class="hello">HELLO, WORLD</div>
    <p class="tagline">Something great is being built</p>

    <div class="divider"></div>

    <p class="message">
      We're suiting up and laying the groundwork. This site is currently
      under construction — check back soon for the full experience.
      <span class="cursor"></span>
    </p>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
    <p class="progress-label">CONSTRUCTION PROGRESS — 72%</p>

    <p class="footer">© 2026 &nbsp;·&nbsp; BACK SOON</p>
  </div>
</body>
</html>
