th.",keys:["⌥","Right Click","Copy as Pathname"]},{id:"fi8",title:"Merge folders with Option",desc:"When copying a folder with same name, hold Option to get 'Merge' instead of Replace. Merges contents non-destructively.",keys:["⌥","Drag"]},{id:"fi9",title:"Smart Folders are saved searches",desc:"File > New Smart Folder. Criteria like Kind is Image, Last opened within 7 days, tagged red. Save to sidebar for live updating folders.",keys:["Smart Folder"]}]},{id:"spotlight",name:"Spotlight & Search",icon:"\uD83D\uDD0D",intro:"Your command palette, calculator, dictionary, and file search — all in one keystroke.",tips:[{id:"s1",title:"Calculator, converter, dictionary",desc:"Hit Cmd+Space and type '492*36', '100 usd to jpy', 'define serendipity', '12ft in cm'. No need to open Calculator app.",keys:["⌘","Space"]},{id:"s2",title:"Drag results out",desc:"Found a file in Spotlight? Drag it directly to Mail, Finder, or Desktop. Hold Command to reveal path in tooltip.",keys:["Drag"]},{id:"s3",title:"Search operators that work",desc:"Use kind:pdf, kind:folder, date:today, date:yesterday, author:john, tag:red. Combine: kind:image date:this week.",code:"kind:screenshot date:last 2 days"},{id:"s4",title:"Quick Look from Spotlight",desc:"In Spotlight results, hold Command to preview file path. Press Cmd to hold preview. Actually, hover result and press Space? No — select result and hold Command.",keys:["⌘"]},{id:"s5",title:"Spotlight as launcher",desc:"Type app name, then Cmd+Enter to show in Finder, or Cmd+R. Hold Cmd while selecting to see metadata.",keys:["⌘","Enter"]},{id:"s6",title:"Search System Settings",desc:"Type 'trackpad', 'battery', 'dock' into Spotlight — it deep-links directly into System Settings panes.",keys:["⌘","Space","Type setting"]},{id:"s7",title:"Disable Spotlight indexing per folder",desc:"System Settings > Spotlight > Search Privacy. Add folders to exclude — useful for dev node_modules or external drives.",keys:["Privacy"]},{id:"s8",title:"mdfind in Terminal is Spotlight CLI",desc:"Faster than find. Live metadata query.",code:`mdfind "kMDItemDisplayName == '*report*' && kMDItemContentType == 'com.adobe.pdf'"`,pro:"Add -0 | xargs -0 to pipe safely with spaces."}]},{id:"windows",name:"Window Management & Mission Control",icon:"\uD83E\uDE9F",intro:"Stop wrestling windows. macOS has tiling, spaces, and gestures built-in since 2020.",tips:[{id:"w1",title:"Hover green button to tile",desc:"Hover (don't click) the green traffic light to see Tile left/right, Fullscreen, and Move to display. On Sequoia, drag window to screen edge for auto-tiling.",keys:["Hover","● Green"]},{id:"w2",title:"Mission Control & App Exposé",desc:"Ctrl+Up for all windows, Ctrl+Down for app windows. Swipe up with 3 fingers for Mission Control. Swipe down with 3-4 fingers for App Exposé.",keys:["^","↑"]},{id:"w3",title:"Move window between Spaces",desc:"In Mission Control, drag window to top bar onto another Space. Or hold window, press Ctrl+1/2/3 to throw to that desktop.",keys:["Ctrl","1","2","3"]},{id:"w4",title:"Stage Manager when you need focus",desc:"Control Center > Stage Manager. Recent apps stack on left. Click desktop to focus. Great for single-tasking on large displays.",keys:["Stage Manager"]},{id:"w5",title:"Hot Corners for instant actions",desc:"Set bottom-right to Quick Note, top-right to Mission Control, bottom-left to Display Sleep. Add Cmd/Opt to avoid accidental triggers.",keys:["Hot Corners"]},{id:"w6",title:"Slow-motion minimize (for fun)",desc:"Hold Shift while minimizing or entering Mission Control for dramatic slow-mo. It's a debugging easter egg left in.",keys:["⇧","Minimize"]},{id:"w7",title:"Drag windows without focusing",desc:"Hold Cmd and drag any window from anywhere — not just title bar — without bringing app to front. Hidden gem.",keys:["⌘","Drag anywhere"]},{id:"w8",title:"Sequoia window snapping",desc:"In macOS 15+, drag to screen edges to snap to halves/quarters, or hold Option while dragging for tiling suggestions. Fill screen without fullscreen.",keys:["Drag to edge"]}]},{id:"keyboard",name:"Keyboard Shortcuts You Must Know",icon:"⌨️",intro:"The keyboard is the fastest input device. These shortcuts pay rent daily.",tips:[{id:"k1",title:"Cmd+Tab with superpowers",desc:"Cmd+Tab then while holding Cmd, press Q to quit, H to hide app, or hover. Press Tab backwards with Shift.",keys:["⌘","Tab","Q / H"]},{id:"k2",title:"Cycle windows in same app",desc:"Cmd+` cycles windows of same app. Cmd+~ goes reverse. Indispensable with 10 Chrome windows.",keys:["⌘","`"]},{id:"k3",title:"Hide everything else",desc:"Cmd+Opt+H hides all apps except current. Then click desktop to hide all. Cmd+H hides just current.",keys:["⌘","⌥","H"]},{id:"k4",title:"Move file instead of copy",desc:"Cmd+C then Cmd+Opt+V pastes and removes original — i.e., move. No drag needed. Works across drives.",keys:["⌘","⌥","V"]},{id:"k5",title:"Lock screen instantly",desc:"Cmd+Ctrl+Q locks immediately. Or set hot corner to Lock Screen. Touch ID Macs: just press power.",keys:["⌘","^","Q"]},{id:"k6",title:"Forward delete & word delete",desc:"Fn+Delete = forward delete. Opt+Delete deletes whole word backward, Opt+Fn+Delete deletes word forward. Cmd+Delete deletes line.",keys:["Fn","Delete"]},{id:"k7",title:"Emoji & symbols",desc:"Cmd+Ctrl+Space opens emoji picker. Type : then letters to search. Double-press fn for emoji too. Hold key for accent menu: e → è é ê.",keys:["⌘","^","Space"]},{id:"k8",title:"Precision text navigation",desc:"Opt+Arrows = jump word, Cmd+Arrows = jump line start/end, Shift adds selection. Opt+Shift+Arrows selects word by word.",keys:["⌥","←","→"]},{id:"k9",title:"Toggle Dock auto-hide",desc:"Cmd+Opt+D toggles Dock hiding. Saves vertical space on 14-inch. Combine with auto-hide menu bar for max content.",keys:["⌘","⌥","D"]},{id:"k10",title:"Force Quit when stuck",desc:"Cmd+Opt+Esc opens Force Quit dialog. Safer than killing from Activity Monitor. Also right-click Dock icon + Opt shows Force Quit.",keys:["⌘","⌥","Esc"]}]},{id:"trackpad",name:"Trackpad & Mouse Gestures",icon:"\uD83D\uDC46",intro:"The trackpad is why you bought a Mac. Use the full vocabulary.",tips:[{id:"t1",title:"Enable Tap to Click + 3-finger drag",desc:"System Settings > Trackpad > Point & Click: Enable Tap to click. Accessibility > Pointer Control > Trackpad Options > Enable dragging with three finger drag.",keys:["3-finger drag"]},{id:"t2",title:"Force Click & 3-finger lookup",desc:"Force Click (hard press) on word for dictionary, on address for Maps, on tracking number for preview. 3-finger tap on word does same (if enabled).",keys:["Force Click"]},{id:"t3",title:"Swipe between pages",desc:"2-finger swipe left/right in Finder, Safari, Preview to go back/forward. System Settings > Trackpad > More Gestures > Swipe between pages.",keys:["2-finger swipe"]},{id:"t4",title:"Pinch to zoom in Quick Look",desc:"While Quick Looking (Space) an image or PDF, pinch to zoom and pan with two fingers. Scroll while holding Option to zoom any window.",keys:["Pinch"]},{id:"t5",title:"Four-finger pinch for Launchpad",desc:"Pinch with thumb + 3 fingers to open Launchpad, spread to exit. 4-finger swipe up = Mission Control, down = App Exposé.",keys:["4-finger pinch"]},{id:"t6",title:"Silent clicking",desc:"System Settings > Trackpad > Enable Silent clicking to remove audible click sound. Also adjust tracking speed to near-max for less wrist movement.",keys:["Silent clicking"]},{id:"t7",title:"Secondary click corners",desc:"Set secondary click to bottom-right corner instead of two-finger tap if you do precision work. Less accidental right-clicks.",keys:["Trackpad Settings"]}]},{id:"screenshots",name:"Screenshots & Screen Recording",icon:"\uD83D\uDCF8",intro:"The built-in screenshot tool is better than most paid apps.",tips:[{id:"sc1",title:"The three screenshot shortcuts",desc:"Cmd+Shift+3 full screen, Cmd+Shift+4 crosshair selection, Cmd+Shift+5 toolbar with options. 4 then Space = window capture.",keys:["⌘","⇧","3 / 4 / 5"]},{id:"sc2",title:"Copy to clipboard instantly",desc:"Add Control to any combo to copy instead of saving: Cmd+Ctrl+Shift+4 → clipboard. Paste directly into Slack, Figma, Mail.",keys:["⌘","⌃","⇧","4"]},{id:"sc3",title:"Screenshot without shadow",desc:"When capturing window with Cmd+Shift+4 → Space, hold Option to remove drop shadow. Clean assets for docs.",keys:["⌥","Click window"]},{id:"sc4",title:"Change save location",desc:"Cmd+Shift+5 > Options > Save to. Or via Terminal:",code:"defaults write com.apple.screencapture location ~/Pictures/Screenshots && killall SystemUIServer",pro:"Set location to /tmp if you only paste, never keep."},{id:"sc5",title:"Annotate instantly after capture",desc:"After capture, thumbnail appears bottom-right. Click it to markup, crop, add text/arrows before it saves. Swipe right to dismiss and save.",keys:["Click thumbnail"]},{id:"sc6",title:"Screen record part of screen",desc:"Cmd+Shift+5 > Record Selected Portion. Enable Show Mouse Clicks in Options. Great for bug reports. Mic audio optional.",keys:["⌘","⇧","5"]},{id:"sc7",title:"Screenshot Touch Bar",desc:"On Touch Bar Macs: Cmd+Shift+6 captures Touch Bar. Rare, but useful for documentation.",keys:["⌘","⇧","6"]}]},{id:"productivity",name:"Productivity & Continuity",icon:"\uD83D\uDD17",intro:"Your Mac + iPhone are one computer. Use the invisible threads.",tips:[{id:"p1",title:"Universal Clipboard",desc:"Copy on iPhone, paste on Mac instantly. Works for text, images, video. Both devices need Bluetooth, same Apple ID, Handoff enabled.",keys:["Copy","Paste"]},{id:"p2",title:"Continuity Camera",desc:"Right-click in Finder, Notes, Keynote > Import from iPhone > Take Photo/Scan Document. Camera feed opens on iPhone, photo appears on Mac.",keys:["Continuity Camera"]},{id:"p3",title:"AirDrop from Share sheet",desc:"Select files > Share > AirDrop. On Sequoia, AirDrop in Finder sidebar shows nearby devices live. Drag & drop directly onto device icon.",keys:["AirDrop"]},{id:"p4",title:"Quick Note anywhere",desc:"Fn+Q or hot corner bottom-right opens Quick Note. It links to current Safari page or app context. All Quick Notes live in Notes app.",keys:["Fn","Q"]},{id:"p5",title:"Live Text OCR everywhere",desc:"In any image or paused video, select text like it's real text. Copy, translate, call number. Works in Photos, Quick Look, Safari.",keys:["Live Text"]},{id:"p6",title:"Visual Look Up",desc:"Photos detects plants, dog breeds, landmarks, art. Click ⓘ or sparkle icon. Also works on iPhone photos synced via iCloud.",keys:["Visual Look Up"]},{id:"p7",title:"Focus modes with filters",desc:"Focus can filter Mail accounts, hide Home Screens, silence notifications per app. Set Work focus to show only Work spaces.",keys:["Focus"]},{id:"p8",title:"Remap Caps Lock to Escape",desc:"System Settings > Keyboard > Modifier Keys. Remap Caps Lock → Escape for Vim, or → Control. Also remap Fn as Globe.",keys:["Caps Lock → Esc"]},{id:"p9",title:"Stacks on Desktop",desc:"Right-click Desktop > Use Stacks. Auto-groups screenshots, images, documents. Click stack to fan out. Hover stack with 2-finger scrub to browse.",keys:["Use Stacks"]}]},{id:"terminal",name:"Terminal for Mortals",icon:"\uD83D\uDCBB",intro:"You don't need to be a developer. Five commands make you dangerous.",tips:[{id:"te1",title:"Open current folder in Finder",desc:"From Terminal, open . launches Finder here. Reverse: drag folder from Finder into Terminal to paste its path.",code:"open .",keys:["open ."]},{id:"te2",title:"Stay awake",desc:"caffeinate prevents sleep. Add -u for user active, -t 3600 for 1 hour. Add -i to prevent idle sleep during a build.",code:"caffeinate -t 7200"},{id:"te3",title:"Copy/paste via pipe",desc:"pbcopy and pbpaste bridge Terminal and clipboard. Perfect for copying command output or file contents without selecting.",code:`cat ~/.ssh/id_rsa.pub | pbcopy

itor is Task Manager",desc:"View > All Processes, Hierarchical. Sort by CPU, Energy, Memory. Use Sample Process to debug hangs. Cmd+Opt+Esc for quick force quit.",keys:["Activity Monitor"]},{id:"pr3",title:"Storage Management",desc:"Apple menu > About This Mac > More Info > Storage Settings > Manage. Shows large files, iOS backups, purgeable space. Empty trash automatically after 30 days.",keys:["Storage"]},{id:"pr4",title:"Safe Mode for diagnostics",desc:"Apple Silicon: Shutdown, hold power until Options, select disk, hold Shift > Continue in Safe Mode. Intel: Hold Shift at boot. Loads without extensions.",keys:["Safe Mode"]},{id:"pr5",title:"Firewall & FileVault",desc:"System Settings > Network > Firewall ON, block incoming except essentials. Privacy > FileVault ON encrypts disk. Keep enabled.",keys:["FileVault"]},{id:"pr6",title:"Hide notification previews",desc:"System Settings > Notifications > Show Previews: When Unlocked. Prevents messages showing on lock screen.",keys:["Notifications"]},{id:"pr7",title:"Reset app permissions",desc:"If an app lost mic/camera access:",code:`tccutil reset Microphone com.example.app
