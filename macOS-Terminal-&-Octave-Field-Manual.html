export FZF_DEFAULT_OPTS='--height 40% --layout=reverse --border --preview "bat --color=always {}"'

# Zoxide
eval "$(zoxide init zsh)"

# Aliases
alias ll='eza -la --icons --git --group-directories-first --time-style=relative'
alias la='eza -a --icons'
alias cat='bat --paging=never'
alias grep='rg'
alias find='fd'
alias top='btop'
alias g='git'
alias gs='git status -sb'
alias gc='git commit'
alias gp='git push'
alias o='open .'
alias c='code .'
alias d='docker'
alias k='kubectl'
alias ports='lsof -i -P -n | grep LISTEN'
alias ..='cd ..'
alias ...='cd ../..'

# Functions
mkcd() { mkdir -p "$1" && cd "$1"; }
extract() { case "$1" in *.tar.gz) tar xzf "$1";; *.zip) unzip "$1";; *) echo "nope";; esac; }
killport() { lsof -ti:$1 | xargs kill -9; }
backup() { cp "$1"{,.bak-$(date +%Y%m%d)}; }
lazy() { git add -A && git commit -m "$*" && git push; }

# Octave alias
alias octave='octave --no-gui -q'
alias oct='octave --gui &'

# Load local
[ -f ~/.zshrc.local ] && source ~/.zshrc.local
