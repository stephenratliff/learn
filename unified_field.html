  p=n; tmp=n;
  for q=2:sqrt(tmp)
    if mod(tmp,q)==0
      while mod(tmp,q)==0, tmp/=q; end
      p=p*(1-1/q);
    end
  end
  if tmp>1, p=p*(1-1/tmp); end
end
